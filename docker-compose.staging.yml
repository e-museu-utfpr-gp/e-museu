# Staging: same as production — external DB + Redis, storage volume for Laravel storage/.
services:
  app-staging:
    build:
      context: .
      dockerfile: Dockerfile.staging
      target: app
    working_dir: /var/www
    volumes:
      - staging_e_museu_storage:/var/www/storage

  web-staging:
    build:
      context: .
      dockerfile: Dockerfile.staging
      target: web
    depends_on:
      - app-staging
    expose:
      - "80"
    volumes:
      - staging_e_museu_storage:/var/www/storage

# Mount storage/ so logs and compiled views survive container rebuilds. Same volume on app + web.
# App data (images/files) is in S3 on Coolify (FILESYSTEM_DISK=s3), not this volume.
volumes:
  staging_e_museu_storage:
