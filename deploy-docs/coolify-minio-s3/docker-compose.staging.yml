# Coolify → Docker Compose (empty project). MinIO for staging.
#
# Inside the container MinIO always uses:
#   9000 = S3 API   (what Laravel’s AWS_ENDPOINT must target, if reachable by hostname)
#   9001 = web console
#
# On the host (staging):
#   20000 → 9000 (S3 API — use http://SERVER_IP:20000 in AWS_ENDPOINT when stacks are separate)
#   20001 → 9001 (console in the browser)
#
services:
  minio-staging:
    # Pinned release (Docker Hub). Bump intentionally for security/features.
    image: 'minio/minio:RELEASE.2025-09-07T16-13-09Z'
    command: 'server /data --console-address ":9001"'
    environment:
      MINIO_ROOT_USER: SERVICE_s3_ROOT_USER
      MINIO_ROOT_PASSWORD: SERVICE_s3_ROOT_PASSWORD
    volumes:
      - 'minio_staging_data:/data'
    ports:
      - '20000:9000'
      - '20001:9001'
    # Official MinIO images ship `mc`; they do not include curl (ubi-micro). See minio docker-compose upstream.
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
volumes:
  minio_staging_data: null
