# Prod-like stack: Dockerfile.prod-local, MySQL, Redis.
services:
  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod-local
      target: app
    working_dir: /var/www/
    volumes:
      # Host bind mount (same idea as local compose): uploads and cache live in ./storage on the machine.
      - ./storage:/var/www/storage
    depends_on:
      - db
      - redis

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod-local
      target: web
    ports:
      - "${WEB_SERVER_PORT_PROD_LOCAL}:80"
    volumes:
      - ./storage:/var/www/storage
    depends_on:
      - app

  db:
    image: mysql:8.0-debian # Image used in staging & production
    environment:
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./docker/mysql/init/01-create-testing-database.sh:/docker-entrypoint-initdb.d/01-create-testing-database.sh:ro

# app + web share ./storage so PHP and nginx/PHP-FPM see the same files (e.g. public disk uploads).
