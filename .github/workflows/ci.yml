name: Continuous Integration

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      E_MUSEU_COMPOSE_FILE: docker-compose.local.yml
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Make run script executable
        run: chmod +x ./run

      - name: Tear down any previous compose stacks
        run: |
          docker compose -f docker-compose.local.yml down --remove-orphans 2>/dev/null || true
          docker compose -f docker-compose.prod-local.yml down --remove-orphans 2>/dev/null || true
      
      - name: Setup environment and run tests
        run: |
          # setup → env (.env from .env.example if missing), compose up, composer, key if no APP_KEY, migrate, seed; -y is non-interactive.
          ./run setup -y
          
          # Run unit and feature tests using run script
          echo "Running tests..."
          ./run test
      
      - name: See containers
        run: ./run ps
      
      - name: Cleanup
        if: always()
        run: |
          ./run down || true

  code-quality:
    runs-on: ubuntu-latest
    env:
      E_MUSEU_COMPOSE_FILE: docker-compose.local.yml
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Make run script executable
        run: chmod +x ./run

      - name: Tear down any previous compose stacks
        run: |
          docker compose -f docker-compose.local.yml down --remove-orphans 2>/dev/null || true
          docker compose -f docker-compose.prod-local.yml down --remove-orphans 2>/dev/null || true
      
      - name: Setup environment
        run: |
          # setup → env (.env from .env.example if missing), compose up, composer, key if no APP_KEY, migrate, seed; -y non-interactive.
          ./run setup -y
      
      - name: See containers
        run: ./run ps
      
      - name: Run code quality checks
        run: |
          echo "Running PHP CodeSniffer..."
          ./run phpcs
          
          echo ""
          echo "Running Laravel Pint (style check)..."
          ./run pint-test
          
          echo ""
          echo "Running PHP Mess Detector..."
          ./run phpmd
          
          echo ""
          echo "Running PHPStan..."
          ./run phpstan
          
          echo ""
          echo "Running PHP Copy/Paste Detector..."
          ./run phpcpd
          
          echo ""
          echo "Running ESLint..."
          ./run eslint
          
          echo ""
          echo "Running Prettier check..."
          ./run prettier-check
          
          echo "✓ All code quality checks passed!"
      
      - name: Cleanup
        if: always()
        run: |
          ./run down || true

  test-production-deploy:
    runs-on: ubuntu-latest
    env:
      APP_DEBUG: false
      APP_ENV: production
      APP_KEY: base64:p3uYMRjeoU/RPjt+wMOklJIn744PftwasNCVRwjfY60=
      APP_NAME: E-Museu
      APP_URL: http://emuseu.com
      DB_DATABASE: db_production
      DB_USERNAME: emuseu_user
      DB_PASSWORD: password_production
      DB_ROOT_PASSWORD: password_root_production
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and start production containers
        run: |
          echo "Building production Docker images..."
          docker compose -f docker-compose.production.test.yml build
          
          echo "Starting production containers..."
          docker compose -f docker-compose.production.test.yml up -d
          
          echo "Waiting for containers to be ready..."
          sleep 10
          
          echo "Checking container status..."
          docker compose -f docker-compose.production.test.yml ps
      
      - name: See containers
        run: docker compose -f docker-compose.production.test.yml ps
      
      - name: Validate containers are running
        run: |
          echo "Validating containers are running..."
          docker compose -f docker-compose.production.test.yml ps | grep -q "Up" || exit 1
          echo "✓ All containers are running"
      
      - name: Wait for database and run deployment commands
        run: |
          echo "Waiting for database to be ready..."
          max_attempts=30
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if docker compose -f docker-compose.production.test.yml exec -T app-production php -r '$url = getenv("DATABASE_URL"); if ($url === false || $url === "") exit(1); $p = parse_url($url); if ($p === false || ($p["scheme"] ?? "") !== "mysql") exit(1); $host = $p["host"] ?? "127.0.0.1"; $port = (int) ($p["port"] ?? 3306); $user = rawurldecode($p["user"] ?? ""); $pass = rawurldecode($p["pass"] ?? ""); $dsn = "mysql:host=" . $host . ";port=" . $port; try { $pdo = new PDO($dsn, $user, $pass); $pdo->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION); exit(0); } catch (Throwable $e) { exit(1); }' 2>/dev/null; then
              echo "✓ Database is ready!"
              break
            fi
            if [ $attempt -lt $max_attempts ]; then
              echo "Waiting for database... (attempt $attempt/$max_attempts)"
              sleep 2
            fi
            attempt=$((attempt + 1))
          done
          
          if [ $attempt -gt $max_attempts ]; then
            echo "ERROR: Database did not become ready after $max_attempts attempts"
            exit 1
          fi
          
          echo "Running Laravel deployment commands..."
          docker compose -f docker-compose.production.test.yml exec -T app-production php artisan config:clear
          docker compose -f docker-compose.production.test.yml exec -T app-production php artisan config:cache
          docker compose -f docker-compose.production.test.yml exec -T app-production php artisan route:cache
          docker compose -f docker-compose.production.test.yml exec -T app-production php artisan migrate --force
          
          echo "✓ Production deployment test completed successfully!"
      
      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.production.test.yml down -v