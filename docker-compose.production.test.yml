# Local/CI smoke test: Dockerfile.production + MySQL + Redis.
# App uses DATABASE_URL / REDIS_URL (Laravel config/database.php). The MySQL image still needs MYSQL_* to create the DB/user on first boot.
#
# DATABASE_URL: reserved URL characters in DB_USERNAME / DB_PASSWORD (@ : / ? # % etc.) must be percent-encoded
# in the URL, or the DSN will break. Prefer discrete DB_HOST/DB_DATABASE/DB_USERNAME/DB_PASSWORD in .env for the
# app and reserve DATABASE_URL for tools that require a single string, using an already-encoded URL from your secret store.
services:
  redis:
    image: redis:7.4-alpine

  db-production:
    image: mysql:8.0-debian
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}

  app-production:
    build:
      context: .
      dockerfile: Dockerfile.production
      target: app
    working_dir: /var/www
    volumes:
      - e_museu_storage:/var/www/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_DEBUG=${APP_DEBUG}
      - APP_ENV=${APP_ENV}
      - APP_KEY=${APP_KEY}
      - APP_NAME=${APP_NAME}
      - APP_URL=${APP_URL}
      - DATABASE_URL=mysql://${DB_USERNAME}:${DB_PASSWORD}@db-production:3306/${DB_DATABASE}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db-production
      - redis

  web-production:
    build:
      context: .
      dockerfile: Dockerfile.production
      target: web
    depends_on:
      - app-production
    expose:
      - "80"
    volumes:
      - e_museu_storage:/var/www/storage

# Mount storage/ so logs and compiled views survive container rebuilds. Same volume on app + web.
volumes:
  e_museu_storage:
