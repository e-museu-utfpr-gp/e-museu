# Coolify → Docker Compose (empty project). MinIO for production.
#
# Only these are parameterized (Coolify env overrides defaults):
#   MINIO_ROOT_USER     — default SERVICE_s3_ROOT_USER
#   MINIO_ROOT_PASSWORD — default SERVICE_s3_ROOT_PASSWORD
#
# Inside the container MinIO always uses:
#   9000 = S3 API
#   9001 = web console
#
# On the host (production):
#   10000 → 9000 (S3 API — use http://SERVER_IP:10000 in AWS_ENDPOINT when stacks are separate)
#   10001 → 9001 (console in the browser)
#
services:
  minio-production:
    image: 'minio/minio:RELEASE.2025-09-07T16-13-09Z'
    command: 'server /data --console-address ":9001"'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-SERVICE_s3_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-SERVICE_s3_ROOT_PASSWORD}
    volumes:
      - 'minio_production_data:/data'
    ports:
      - '10000:9000'
      - '10001:9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  minio_production_data: null
