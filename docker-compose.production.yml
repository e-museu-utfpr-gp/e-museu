# Production (Coolify): external DB + Redis. Volume = Laravel storage/ only.
services:
  app-production:
    build:
      context: .
      dockerfile: Dockerfile.production
      target: app
    working_dir: /var/www
    volumes:
      - production_e_museu_storage:/var/www/storage

  web-production:
    build:
      context: .
      dockerfile: Dockerfile.production
      target: web
    depends_on:
      - app-production
    expose:
      - "80"
    volumes:
      - production_e_museu_storage:/var/www/storage

# Mount storage/ so logs and compiled views survive container rebuilds. Same volume on app + web.
# App data (images/files) is in S3 on Coolify (FILESYSTEM_DISK=s3), not this volume.
volumes:
  production_e_museu_storage:
